<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NIKKE SCANNER // COMMAND CENTER</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #F2F2F2;
            --accent-red: #D91A2A;
            --accent-blue: #1A4BD9;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            text-transform: uppercase;
        }

        .header {
            border-bottom: 4px solid var(--accent-red);
            margin-bottom: 30px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--accent-red);
        }

        .subtitle {
            color: var(--accent-blue);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .char-card {
            background-color: #111;
            border: 2px solid var(--border-color);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .char-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-bottom: 10px;
            border: 1px solid #333;
        }

        .char-card .name {
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 选中状态 */
        .char-card.selected {
            border-color: var(--accent-red);
            background-color: rgba(217, 26, 42, 0.1);
            box-shadow: 0 0 15px rgba(217, 26, 42, 0.3);
        }

        .char-card.selected::after {
            content: "TARGET";
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent-red);
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            font-weight: bold;
        }

        .execute-btn {
            background-color: var(--accent-red);
            color: var(--text-main);
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .execute-btn:hover {
            background-color: #ff1e32;
        }

        .execute-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #888;
        }

        #status-msg {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
            color: var(--accent-blue);
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SCANNER SYSTEM</h1>
        <div class="subtitle">SELECT TARGETS FOR INSPECTION</div>
    </div>

    <div class="grid-container" id="char-grid">
        {% for char in characters %}
        <div class="char-card" data-name="{{ char.name }}" onclick="toggleSelect(this)">
            <img src="/assets/avatars/{{ char.name }}/{{ char.cover }}" alt="{{ char.name }}">
            <div class="name">{{ char.name }}</div>
        </div>
        {% endfor %}
    </div>

    <button class="execute-btn" id="start-btn" onclick="startScan()" disabled>EXECUTE SCAN_</button>
    <div id="status-msg"></div>

    <script>
        let selectedCharacters = [];

        function toggleSelect(element) {
            const charName = element.getAttribute('data-name');
            element.classList.toggle('selected');
            
            if (element.classList.contains('selected')) {
                selectedCharacters.push(charName);
            } else {
                selectedCharacters = selectedCharacters.filter(name => name !== charName);
            }
            
            const btn = document.getElementById('start-btn');
            btn.disabled = selectedCharacters.length === 0;
            if (selectedCharacters.length > 0) {
                btn.innerText = `EXECUTE SCAN [ ${selectedCharacters.length} TARGETS ]_`;
            } else {
                btn.innerText = "EXECUTE SCAN_";
            }
        }

        async function startScan() {
            if (selectedCharacters.length === 0) return;
            
            const statusMsg = document.getElementById('status-msg');
            const btn = document.getElementById('start-btn');
            
            btn.disabled = true;
            statusMsg.style.color = "#D91A2A";
            statusMsg.innerText = "WARNING: SEQUENCE INITIATED. SWITCH TO GAME WINDOW IMMEDIATELY.";

            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ characters: selectedCharacters })
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    setTimeout(() => {
                        statusMsg.style.color = "#1A4BD9";
                        statusMsg.innerText = "SCANNING IN PROGRESS...";
                    }, 3000);
                }
            } catch (error) {
                statusMsg.innerText = "ERROR: CONNECTION FAILED.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
